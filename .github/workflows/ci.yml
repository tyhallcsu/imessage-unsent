name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: Shellcheck (all shell sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck
      - name: Run shellcheck via Make
        run: make shellcheck

  python-lint:
    name: Python lint (ruff + py_compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linters
        run: pip install --quiet ruff
      - name: Run python-check via Make
        run: make python-check

  pytest:
    name: pytest (tests/python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        run: pip install --quiet pytest
      - name: Build deterministic fixture
        run: make fixture
      - name: Run pytest via Make
        run: make python-test

  bats-tests:
    name: bats tests (tests/bats)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Homebrew bottles
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew/downloads
          key: brew-bats-core-${{ runner.os }}-v1
          restore-keys: |
            brew-bats-core-${{ runner.os }}-
      - name: Install bats-core
        run: brew install bats-core
      - name: Build deterministic fixture
        run: make fixture
      - name: Run bats
        run: bats tests/bats

  swift-build-daemon:
    name: Swift build + test (daemon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache daemon .build
        uses: actions/cache@v4
        with:
          path: daemon/.build
          key: swift-daemon-${{ runner.os }}-${{ hashFiles('daemon/Package.swift', 'daemon/Sources/**/*.swift', 'daemon/Tests/**/*.swift') }}
          restore-keys: |
            swift-daemon-${{ runner.os }}-
      - name: swift build
        run: swift build --package-path daemon
      - name: swift test
        run: swift test --package-path daemon

  swift-build-gui:
    name: Swift build + test (gui)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache gui .build
        uses: actions/cache@v4
        with:
          path: gui/.build
          key: swift-gui-${{ runner.os }}-${{ hashFiles('gui/Package.swift', 'gui/Sources/**/*.swift', 'gui/Tests/**/*.swift') }}
          restore-keys: |
            swift-gui-${{ runner.os }}-
      - name: swift build
        run: swift build --package-path gui
      - name: swift test
        run: swift test --package-path gui

  readme-link-check:
    name: README link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify README internal links resolve
        run: |
          # crude check: every [..](path) where path starts with ./ or no scheme should exist
          # Strips URL fragments (#section) and query strings (?key=val) before
          # the file existence check so deep links like foo.md#section pass.
          fail=0
          while IFS= read -r line; do
            target="${line#*](}"; target="${target%%)*}"
            case "$target" in
              http*|\#*|mailto:*) continue ;;
              *)
                file="${target%%#*}"
                file="${file%%\?*}"
                [ -e "$file" ] || { echo "Broken link: $target (file: $file)"; fail=1; }
                ;;
            esac
          done < <(grep -oE '\]\([^)]+\)' README.md)
          exit "$fail"

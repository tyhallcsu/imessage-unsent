name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: Shellcheck (scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          sudo apt-get update -y && sudo apt-get install -y shellcheck
          shellcheck --severity=warning \
            scripts/recover.sh \
            scripts/lib/*.sh \
            scripts/install-daemon.sh \
            scripts/uninstall-daemon.sh \
            tests/fixtures/build-fixture.sh \
            script/build_and_run.sh

  python-lint:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linters
        run: pip install --quiet ruff
      - name: Ruff check
        run: ruff check scripts/decode.py scripts/lib/wal_extract.py scripts/lib/json_report.py tests/python/test_decode.py
      - name: Compile-check
        run: python -m py_compile scripts/decode.py scripts/lib/wal_extract.py scripts/lib/json_report.py

  bats-tests:
    name: bats tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: brew install bats-core
      - name: Run bats
        run: bats tests/bats

  pytest:
    name: pytest
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        run: pip install --quiet pytest
      - name: Run pytest
        run: pytest tests/python

  swift:
    name: Swift build and test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Daemon tests
        run: swift test --package-path daemon
      - name: GUI tests
        run: swift test --package-path gui

  readme-link-check:
    name: README link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify README internal links resolve
        run: |
          # crude check: every [..](path) where path starts with ./ or no scheme should exist
          fail=0
          while IFS= read -r line; do
            target="${line#*](}"; target="${target%%)*}"
            case "$target" in
              http*|\#*|mailto:*) continue ;;
              *) [ -e "$target" ] || { echo "Broken link: $target"; fail=1; } ;;
            esac
          done < <(grep -oE '\]\([^)]+\)' README.md)
          exit "$fail"

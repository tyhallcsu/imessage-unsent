name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build artifacts and publish release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for release notes generation

      - name: Verify tag format
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag $tag is not semver (vMAJOR.MINOR.PATCH)"; exit 1
          fi
          echo "TAG=$tag" >> "$GITHUB_ENV"

      - name: Build source tarball
        run: |
          mkdir -p dist
          tar --exclude='.git' --exclude='dist' --exclude='imessage-recovery' \
              -czf "dist/imessage-unsent-${TAG}.tar.gz" .
          shasum -a 256 "dist/imessage-unsent-${TAG}.tar.gz" \
            > "dist/imessage-unsent-${TAG}.tar.gz.sha256"

      - name: Generate release notes
        id: notes
        run: |
          prev_tag=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
          if [ -n "$prev_tag" ]; then
            range="${prev_tag}..${TAG}"
          else
            range="${TAG}"
          fi
          {
            echo "## What changed"
            echo
            git log --pretty='- %s (%h)' "$range" | head -50
            echo
            echo "## Artifacts"
            echo
            echo "- \`imessage-unsent-${TAG}.tar.gz\` — source bundle"
            echo "- \`imessage-unsent-${TAG}.tar.gz.sha256\` — checksum"
          } > release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            dist/imessage-unsent-${TAG}.tar.gz \
            dist/imessage-unsent-${TAG}.tar.gz.sha256

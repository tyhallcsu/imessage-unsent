name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

jobs:
  release:
    name: Build, test, and publish release artifacts
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for release notes generation

      - name: Verify tag format
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
            echo "::error::Tag $tag is not semver (vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease)"; exit 1
          fi
          echo "TAG=$tag" >> "$GITHUB_ENV"
          if [[ "$tag" == *-* ]]; then
            echo "PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "PRERELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Cache daemon .build
        uses: actions/cache@v4
        with:
          path: daemon/.build
          key: swift-daemon-release-${{ runner.os }}-${{ hashFiles('daemon/Package.swift', 'daemon/Sources/**/*.swift') }}
          restore-keys: |
            swift-daemon-release-${{ runner.os }}-

      - name: Cache gui .build
        uses: actions/cache@v4
        with:
          path: gui/.build
          key: swift-gui-release-${{ runner.os }}-${{ hashFiles('gui/Package.swift', 'gui/Sources/**/*.swift') }}
          restore-keys: |
            swift-gui-release-${{ runner.os }}-

      - name: Run swift tests (gate the release)
        run: |
          swift test --package-path daemon
          swift test --package-path gui

      - name: Build + sign + notarize release artifacts
        env:
          # Signing secrets (optional). When all four are present,
          # scripts/sign-release.sh signs both the daemon binary and the
          # GUI .app with the Developer ID Application cert and Hardened
          # Runtime. When any are missing, signing is skipped with a
          # clear log and unsigned artifacts are produced — forks can
          # still cut testable builds without provisioning Apple secrets.
          APPLE_DEVELOPER_ID_CERT_BASE64:   ${{ secrets.APPLE_DEVELOPER_ID_CERT_BASE64 }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
          APPLE_DEVELOPER_ID_NAME:          ${{ secrets.APPLE_DEVELOPER_ID_NAME }}
          APPLE_TEAM_ID:                    ${{ secrets.APPLE_TEAM_ID }}
          # Notarization secrets (also optional). When present alongside
          # the signing secrets, the GUI is submitted to notarytool with
          # --wait and the ticket is stapled. Daemon binaries cannot be
          # stapled (Mach-O), so the daemon is signed but not notarized.
          APPLE_NOTARIZE_USER:     ${{ secrets.APPLE_NOTARIZE_USER }}
          APPLE_NOTARIZE_PASSWORD: ${{ secrets.APPLE_NOTARIZE_PASSWORD }}
        run: |
          bash scripts/build-release.sh "$TAG" dist

      - name: Generate release notes
        run: |
          # Pass the dist dir so release-notes.sh can read SIGNING_STATUS and
          # label artifacts honestly (UNSIGNED / SIGNED / SIGNED & NOTARIZED).
          bash scripts/release-notes.sh "$TAG" dist \
            | sed "s/VERSION/${TAG}/g" \
            > release-notes.md
          echo "--- release notes preview ---"
          cat release-notes.md

      - name: Build source tarball (preserved for downstream packagers)
        run: |
          tar --exclude='.git' --exclude='dist' --exclude='imessage-recovery' \
              --exclude='**/.build' \
              -czf "dist/imessage-unsent-${TAG}-source.tar.gz" .
          ( cd dist && shasum -a 256 "imessage-unsent-${TAG}-source.tar.gz" \
              > "imessage-unsent-${TAG}-source.tar.gz.sha256" )

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prerelease_flag=""
          if [[ "$PRERELEASE" == "true" ]]; then
            prerelease_flag="--prerelease"
          fi
          # shellcheck disable=SC2086
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            --draft \
            $prerelease_flag \
            dist/*.tar.gz \
            dist/*.tar.gz.sha256 \
            dist/*.zip \
            dist/*.zip.sha256
          echo "::notice::Draft release $TAG created. Review and publish from the GitHub Releases UI."

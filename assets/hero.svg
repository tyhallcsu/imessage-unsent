  <text x="143" y="296" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="21" font-weight="400" letter-spacing="0" fill="#cbd5e1">Recover retracted iMessage text from the SQLite WAL.</text>
  <rect x="143" y="324" width="220" height="5" rx="2.5" fill="url(#line)"/>


<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" role="img" aria-label="imessage-unsent recovery workflow">
  <defs>
    <linearGradient id="banner" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.5" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0 0 L0 6 L8 3 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1200" height="540" fill="#f8fafc"/>
  <rect x="0" y="0" width="1200" height="112" fill="url(#banner)"/>
  <text x="64" y="70" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="40" font-weight="750" letter-spacing="0" fill="#f8fafc">Recovery workflow</text>
  <text x="64" y="98" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" letter-spacing="0" fill="#cbd5e1">The same sequence implemented by scripts/recover.sh</text>

  <path d="M160 292H1018" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(62 164)">
    <rect width="188" height="176" rx="8" fill="#ffffff" stroke="#dbe2ea"/>
    <circle cx="36" cy="38" r="16" fill="#0f766e"/>
    <text x="36" y="44" text-anchor="middle" font-family="'SFMono-Regular', Consolas, monospace" font-size="18" font-weight="700" fill="#ffffff">0</text>
    <text x="24" y="78" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Freeze state</text>
    <text x="24" y="108" font-family="'SFMono-Regular', Consolas, monospace" font-size="13" fill="#475569">quit Messages.app</text>
    <text x="24" y="132" font-family="'SFMono-Regular', Consolas, monospace" font-size="13" fill="#475569">copy chat.db family</text>
    <rect x="24" y="150" width="140" height="4" rx="2" fill="#2dd4bf"/>
  </g>

  <g transform="translate(284 164)">
    <rect width="188" height="176" rx="8" fill="#ffffff" stroke="#dbe2ea"/>
    <circle cx="36" cy="38" r="16" fill="#1d4ed8"/>
    <text x="36" y="44" text-anchor="middle" font-family="'SFMono-Regular', Consolas, monospace" font-size="18" font-weight="700" fill="#ffffff">1</text>
    <text x="24" y="78" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Locate row</text>
    <text x="24" y="108" font-family="'SFMono-Regular', Consolas, monospace" font-size="13" fill="#475569">--handle maps chat</text>
    <text x="24" y="132" font-family="'SFMono-Regular', Consolas, monospace" font-size="13" fill="#475569">date_edited != 0</text>
    <rect x="24" y="150" width="140" height="4" rx="2" fill="#60a5fa"/>
  </g>

  <g transform="translate(506 164)">
    <rect width="188" height="176" rx="8" fill="#ffffff" stroke="#dbe2ea"/>
    <circle cx="36" cy="38" r="16" fill="#7c3aed"/>
    <text x="36" y="44" text-anchor="middle" font-family="'SFMono-Regular', Consolas, monospace" font-size="18" font-weight="700" fill="#ffffff">2</text>
    <text x="24" y="78" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Decode BLOBs</text>
    <text x="24" y="108" font-family="'SFMono-Regular', Consolas, monospace" font-size="13" fill="#475569">msi.bin to msi.xml</text>
    <text x="24" y="132" font-family="'SFMono-Regular', Consolas, monospace" font-size="13" fill="#475569">typedstream optional</text>
    <rect x="24" y="150" width="140" height="4" rx="2" fill="#a78bfa"/>
  </g>

  <g transform="translate(728 164)">
    <rect width="188" height="176" rx="8" fill="#ffffff" stroke="#dbe2ea"/>
    <circle cx="36" cy="38" r="16" fill="#b45309"/>
    <text x="36" y="44" text-anchor="middle" font-family="'SFMono-Regular', Consolas, monospace" font-size="18" font-weight="700" fill="#ffffff">3</text>
    <text x="24" y="78" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Scan WAL</text>
    <text x="24" y="108" font-family="'SFMono-Regular', Consolas, monospace" font-size="13" fill="#475569">GUID byte hits</text>
    <text x="24" y="132" font-family="'SFMono-Regular', Consolas, monospace" font-size="13" fill="#475569">extract UTF-8 text</text>
    <rect x="24" y="150" width="140" height="4" rx="2" fill="#f59e0b"/>
  </g>

  <g transform="translate(950 164)">
    <rect width="188" height="176" rx="8" fill="#ffffff" stroke="#dbe2ea"/>
    <circle cx="36" cy="38" r="16" fill="#be123c"/>
    <text x="36" y="44" text-anchor="middle" font-family="'SFMono-Regular', Consolas, monospace" font-size="18" font-weight="700" fill="#ffffff">4</text>
    <text x="24" y="78" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Cross-check</text>
    <text x="24" y="108" font-family="'SFMono-Regular', Consolas, monospace" font-size="13" fill="#475569">length matches otr</text>
    <text x="24" y="132" font-family="'SFMono-Regular', Consolas, monospace" font-size="13" fill="#475569">exporter if present</text>
    <rect x="24" y="150" width="140" height="4" rx="2" fill="#fb7185"/>
  </g>

  <rect x="176" y="398" width="848" height="58" rx="8" fill="#0f172a"/>
  <rect x="176" y="398" width="848" height="5" fill="url(#accent)"/>
  <text x="206" y="434" font-family="'SFMono-Regular', Consolas, monospace" font-size="16" fill="#e5e7eb">Output: report.txt, candidates.tsv, msi.xml, ab.bin, wal-hits.txt</text>
</svg>
